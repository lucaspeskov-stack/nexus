name: Auto Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'clientes/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy new clients
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for dir in clientes/*/; do
            client=$(basename "$dir")
            client_lower=$(echo "$client" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
            echo "🚀 Deploying: $client -> $client_lower"
            vercel "$dir" --prod --token $VERCEL_TOKEN --yes --name "$client_lower"
          done
