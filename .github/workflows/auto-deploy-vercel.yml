name: Auto Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'clientes/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy new clients
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Pega só as pastas que mudaram neste commit
          changed=$(git diff --name-only HEAD~1 HEAD -- 'clientes/' | grep '^clientes/' | cut -d'/' -f2 | sort -u)
          
          for client in $changed; do
            dir="clientes/$client"
            if [ -d "$dir" ]; then
              client_lower=$(echo "$client" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
              echo "🚀 Deploying: $client_lower"
              vercel "$dir" --prod --token $VERCEL_TOKEN --yes
            fi
          done
