name: Auto Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'clientes/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy new clients
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Pega só as pastas que mudaram neste commit
          changed=$(git diff --name-only HEAD~1 HEAD -- 'clientes/' | grep '^clientes/' | cut -d'/' -f2 | sort -u)

          for client in $changed; do
            dir="clientes/$client"
            if [ -d "$dir" ]; then
              client_lower=$(echo "$client" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
              echo "🚀 Deploying: $client_lower"

              cd "$dir"

              # Linka (ou cria) o projeto Vercel com nome igual à pasta do cliente,
              # dentro do escopo do time Forja
              vercel link --yes --token="$VERCEL_TOKEN" --project="$client_lower" --scope=team_G9yrlsW10205HeU8oq6cryQ9

              # Faz o deploy de produção — lê org/project ID do .vercel/project.json criado acima
              vercel deploy --prod --token="$VERCEL_TOKEN" --yes

              cd - > /dev/null
            fi
          done
